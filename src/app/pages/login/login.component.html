<div class="login-container">
    <div class="main-container">
        <img data-aos="zoom-in" data-aos-duration="1000" src="Pokemon_logo.png" alt="Pokemon" class="login-image" />
        <img data-aos="zoom-in" data-aos-duration="1000" data-aos-delay="600" src="pokeball.png" alt="pokeball"
            class="pokeball-image" />
        <form [formGroup]="loginForm" class="poke-form" data-aos="zoom-in" data-aos-duration="1000"
            data-aos-delay="400">
            <div class="form-group" style="width: 100%;">
                <input formControlName="user" type="text" class="form-control" placeholder="User"
                    [class.is-invalid]="loginForm.get('user')?.invalid && loginForm.get('user')?.touched">
            </div>
            <div class="form-group">
                <input formControlName="password" type="password" class="form-control" placeholder="Password"
                    [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            </div>
            <button [disabled]="loginForm.invalid" type="submit" class="btn btn-outline-light login-btn"
                (click)="login()">Login</button>
        </form>
    </div>
</div>
